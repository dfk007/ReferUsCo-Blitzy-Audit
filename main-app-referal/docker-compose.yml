services:
  mongo:
    image: mongo:7
    container_name: referus-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: referralhub
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - referus_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: referus-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/referralhub
      CLIENT_URL: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_CHAT_MODEL: ${GROQ_CHAT_MODEL:-llama-3.1-8b-instant}
    networks:
      - referus_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ""
        REACT_APP_SOCKET_URL: ""
    container_name: referus-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - referus_network

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local

networks:
  referus_network:
    driver: bridge
